name: Docs

# Build rustdoc for the three crates and publish to GitHub Pages.
#
# Docs are built for the PPC target (via the examples/hello build
# config, which carries the target JSON + -Zbuild-std), so the
# PPC-only modules (fs, net, http, thread, env, dns) are included —
# a host-target doc build would silently omit them.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build rustdoc
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Keep in sync with rust-toolchain.toml (see ci.yml for why the
      # pin is duplicated).
      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-03-01
          components: rust-src

      - name: Make fake-linkers executable
        run: chmod +x examples/hello/fake-linker.sh

      - name: Build docs (PPC target)
        working-directory: examples/hello
        run: |
          cargo doc --release --no-deps \
            -p amigaos4 -p amigaos4-sys -p amigaos4-alloc

      - name: Add index redirect
        run: |
          echo '<meta http-equiv="refresh" content="0; url=amigaos4/index.html">' \
            > examples/hello/target/powerpc-amigaos/doc/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: examples/hello/target/powerpc-amigaos/doc

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
