name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Tests/ rust_regression.rs asserts clib4-src/.git exists —
          # it pins the upstream clib4 commit the nightly was built
          # against. Pull the submodule so that test passes.
          submodules: true

      # ── Toolchain ────────────────────────────────────────────────
      # Keep this in sync with rust-toolchain.toml at the repo root.
      # Pin is duplicated here (rather than reading the .toml) because
      # the dtolnay action installs one fixed toolchain per invocation;
      # bare cargo calls below then pick up the same pin via the .toml.
      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-03-01
          components: rust-src

      - name: Rust version
        run: rustc --version && cargo --version

      # ── PPC link toolchain (Docker) ──────────────────────────────
      # The walkero image carries ppc-amigaos-gcc 11 plus the OS4 SDK
      # and is what build.sh shells out to. Pre-pull so each example's
      # `docker run` is a cache hit. The image is ~2.5 GB compressed
      # but doesn't change often.
      - name: Pull ppc-amigaos GCC Docker image
        run: docker pull walkero/amigagccondocker:os4-gcc11

      # Git stores these without +x on a Windows checkout; CI needs them
      # executable to run as shebang scripts.
      - name: Make build.sh and fake-linkers executable
        run: |
          chmod +x build.sh
          find . -name 'fake-linker.sh' -exec chmod +x {} +

      # ── Library crates (cross-compiled to PPC, no link step) ─────
      # These have no Cargo.toml of their own that sets up build-std;
      # build them as dependencies by using an example project's
      # .cargo/config.toml which enables build-std + json-target-spec.
      # They produce rlibs/staticlibs only — no Docker link needed.
      - name: Build amigaos4-sys (PPC)
        working-directory: examples/hello
        run: cargo build --release -p amigaos4-sys

      - name: Build amigaos4-alloc (PPC)
        working-directory: examples/hello
        run: cargo build --release -p amigaos4-alloc

      - name: Build amigaos4 (PPC)
        working-directory: examples/hello
        run: cargo build --release -p amigaos4

      # ── Example projects (cargo staticlib + Docker link → ELF) ───
      # build.sh runs `cargo build --release` on the host, then shells
      # into the walkero Docker image to link the Rust staticlib + C
      # glue into the final PPC executable. The clib4-nightly overlay
      # is dropped into the image's SDK so app-mode examples link
      # against the same clib4 the project ships.
      - name: Build examples/hello (link to ELF)
        run: ./build.sh examples/hello

      - name: Build examples/hello-driver (link to ELF)
        run: ./build.sh examples/hello-driver

      - name: Build examples/hello-library (link to ELF)
        run: ./build.sh examples/hello-library

      - name: Build examples/test-harness (link to ELF)
        run: ./build.sh examples/test-harness

      - name: Build examples/test-harness-gui (link to ELF)
        run: ./build.sh examples/test-harness-gui

      - name: Build examples/test-harness-net (link to ELF)
        run: ./build.sh examples/test-harness-net

      - name: Build examples/file-io-demo (link to ELF)
        run: ./build.sh examples/file-io-demo

      - name: Build examples/timer-demo (link to ELF)
        run: ./build.sh examples/timer-demo

      - name: Build examples/thread-demo (link to ELF)
        run: ./build.sh examples/thread-demo

      - name: Build examples/gui-demo (link to ELF)
        run: ./build.sh examples/gui-demo

      - name: Build examples/net-demo (link to ELF)
        run: ./build.sh examples/net-demo

      - name: Build examples/async-demo (link to ELF)
        run: ./build.sh examples/async-demo

      - name: Build examples/thread-amissl-probe (link to ELF)
        run: ./build.sh examples/thread-amissl-probe

      - name: Build examples/http-client (link to ELF)
        run: ./build.sh examples/http-client

      - name: Build examples/zlib-roundtrip (link to ELF)
        run: ./build.sh examples/zlib-roundtrip

      - name: Build examples/picture-viewer (link to ELF)
        run: ./build.sh examples/picture-viewer

      - name: Build examples/wbstartup-hello (link to ELF)
        run: ./build.sh examples/wbstartup-hello

      - name: Build examples/xadmaster-list (link to ELF)
        run: ./build.sh examples/xadmaster-list

      - name: Build examples/async-net-echo (link to ELF)
        run: ./build.sh examples/async-net-echo

      - name: Build examples/iff-dump (link to ELF)
        run: ./build.sh examples/iff-dump

      - name: Build examples/locale-i18n-hello (link to ELF)
        run: ./build.sh examples/locale-i18n-hello

      - name: Build examples/audio-tone (link to ELF)
        run: ./build.sh examples/audio-tone

      - name: Build examples/ram-device (link to ELF)
        run: ./build.sh examples/ram-device

      - name: Build examples/aminet-browser (link to ELF)
        run: ./build.sh examples/aminet-browser

      - name: Build examples/https-client (link to ELF)
        run: ./build.sh examples/https-client

      - name: Build examples/sqlite3-demo (link to ELF)
        run: ./build.sh examples/sqlite3-demo

      - name: Build examples/json-config (link to ELF)
        run: ./build.sh examples/json-config

      # ── Verify each example produced a PPC ELF ───────────────────
      # Cheap insurance against `make all` silently no-op'ing.
      - name: Verify ELF outputs
        run: |
          set -e
          check() {
            local f="$1"
            if [ ! -s "$f" ]; then
              echo "::error::missing or empty: $f"; exit 1
            fi
            file "$f" | grep -q 'ELF 32-bit MSB.*PowerPC' || {
              echo "::error::not a PPC ELF: $f"; file "$f"; exit 1
            }
            echo "  ok: $f ($(stat -c%s "$f") bytes)"
          }
          check examples/hello/hello
          check examples/hello-driver/hello-driver
          check examples/hello-library/hello.library
          check examples/test-harness/test-harness
          check examples/test-harness-gui/test-harness-gui
          check examples/test-harness-net/test-harness-net
          check examples/file-io-demo/file-io-demo
          check examples/timer-demo/timer-demo
          check examples/thread-demo/thread-demo
          check examples/gui-demo/gui-demo
          check examples/net-demo/net-demo
          check examples/async-demo/async-demo
          check examples/thread-amissl-probe/thread-amissl-probe
          check examples/http-client/http-client
          check examples/zlib-roundtrip/zlib-roundtrip
          check examples/picture-viewer/picture-viewer
          check examples/wbstartup-hello/wbstartup-hello
          check examples/xadmaster-list/xadmaster-list
          check examples/async-net-echo/async-net-echo
          check examples/iff-dump/iff-dump
          check examples/locale-i18n-hello/locale-i18n-hello
          check examples/audio-tone/audio-tone

      # ── Host-side tests ──────────────────────────────────────────
      # Run unit / integration tests for the amigaos4 crate on the
      # host (x86_64), testing pure-Rust logic only — no PPC, no
      # cross-compilation.
      - name: Test amigaos4 (host)
        working-directory: amigaos4
        run: cargo test

      - name: Test amigaos4-sys (host)
        working-directory: amigaos4-sys
        run: cargo test

      - name: Test amigaos4-alloc (host)
        working-directory: amigaos4-alloc
        run: cargo test --features exec

      # ── Black-box test suite ─────────────────────────────────────
      # signature_audit / sdk_audit / api smoke / regression / repro /
      # combined_amigaos4 — all host-runnable, fast.
      - name: Run Tests/ suite
        working-directory: Tests
        run: cargo test

      # ── Artifacts ────────────────────────────────────────────────
      # Upload the freshly-linked PPC ELFs so they can be grabbed from
      # the workflow run without rebuilding locally.
      - name: Upload PPC ELFs
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: amigaos4-elfs
          path: |
            examples/hello/hello
            examples/hello-driver/hello-driver
            examples/hello-library/hello.library
            examples/test-harness/test-harness
            examples/test-harness-gui/test-harness-gui
            examples/test-harness-net/test-harness-net
            examples/file-io-demo/file-io-demo
            examples/timer-demo/timer-demo
            examples/thread-demo/thread-demo
            examples/gui-demo/gui-demo
            examples/net-demo/net-demo
            examples/async-demo/async-demo
            examples/thread-amissl-probe/thread-amissl-probe
            examples/http-client/http-client
            examples/zlib-roundtrip/zlib-roundtrip
            examples/picture-viewer/picture-viewer
            examples/wbstartup-hello/wbstartup-hello
            examples/xadmaster-list/xadmaster-list
            examples/async-net-echo/async-net-echo
            examples/iff-dump/iff-dump
            examples/locale-i18n-hello/locale-i18n-hello
            examples/audio-tone/audio-tone
          if-no-files-found: error
          retention-days: 14
